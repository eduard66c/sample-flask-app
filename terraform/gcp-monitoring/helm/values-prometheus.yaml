# Monitoring Stack - Main values.yaml
# This file configures the entire monitoring stack using Helm charts

kubePrometheusStack:
  enabled: true

# KUBE-PROMETHEUS-STACK Configuration
# Full docs: https://github.com/prometheus-community/helm-charts/tree/main/charts/kube-prometheus-stack

kubePrometheusStack:
  prometheusOperator:
    enabled: true

  prometheus:
    enabled: true
    prometheusSpec:
      storageSpec:
        volumeClaimTemplate:
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: 10Gi

      retention: 15d

      serviceMonitorSelectorNilUsesHelmValues: false

      resources:
        requests:
          cpu: 100m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 1Gi

  grafana:
    enabled: true
    adminPassword: admin
    persistence:
      enabled: true
      size: 5Gi

    datasources:
      datasources.yaml:
        apiVersion: 1
        datasources:
          - name: Prometheus
            type: prometheus
            url: http://prometheus:9090
            isDefault: true
          - name: Loki
            type: loki
            url: http://loki:3100
            isDefault: false

  nodeExporter:
    enabled: true

  kubeStateMetrics:
    enabled: true

  prometheus-node-exporter:
    enabled: true

  alertmanager:
    enabled: false